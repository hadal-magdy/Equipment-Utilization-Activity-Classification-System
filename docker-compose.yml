version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Equipment Utilization & Activity Classification System
#  Start everything:  docker compose up --build
#  Stop:             docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Apache Kafka (KRaft mode — no Zookeeper needed) ─────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── TimescaleDB ──────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       equipment_db
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── CV Service ───────────────────────────────────────────────────────────
  cv_service:
    build: ./cv_service
    container_name: cv_service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: "kafka:29092"
      VIDEO_SOURCE:    "/data/video.mp4"   # override with RTSP URL for live feed
      YOLO_MODEL:      "yolov8n.pt"
      OUTPUT_VIDEO:    "/data/output.mp4"
    volumes:
      - ./data:/data                        # mount your video file here
    restart: on-failure

  # ── Kafka → DB Consumer ──────────────────────────────────────────────────
  consumer_service:
    build: ./consumer_service
    container_name: consumer_service
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: "kafka:29092"
      DB_HOST:         timescaledb
      DB_PORT:         "5432"
      DB_NAME:         equipment_db
      DB_USER:         postgres
      DB_PASS:         postgres
    restart: on-failure

  # ── Streamlit UI ─────────────────────────────────────────────────────────
  ui_service:
    build: ./ui_service
    container_name: ui_service
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      DB_HOST:     timescaledb
      DB_PORT:     "5432"
      DB_NAME:     equipment_db
      DB_USER:     postgres
      DB_PASS:     postgres
      REFRESH_SEC: "3"
    restart: on-failure


volumes:
  timescale_data:
